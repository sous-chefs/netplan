---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: chef
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true

verifier:
  name: inspec

platforms:
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: default
    run_list: recipe[test::default]
